services:
  - type: web
    name: blogeforge-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r "5. Project Development Phase/backend/requirements.txt"
    startCommand: cd "5. Project Development Phase/backend" && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: DATABASE_URL
        sync: false
        description: "Your Neon PostgreSQL Connection String (starts with postgresql://)"
      - key: GEMINI_API_KEY
        sync: false
        description: "Your Google Gemini API Key"
      - key: SECRET_KEY
        sync: false
        description: "A random secure string for JWT token signatures"
